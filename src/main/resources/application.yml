spring:
  application:
    name: restaurant-backend

  # R2DBC - driver reactivo no bloqueante
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:restaurant_db}
    username: ${DB_USER:restaurant_user}
    password: ${DB_PASS:secret123}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  # Flyway usa JDBC clásico únicamente para ejecutar migraciones al arrancar
  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:restaurant_db}
    user: ${DB_USER:restaurant_user}
    password: ${DB_PASS:secret123}
    locations: classpath:db/migration
    baseline-on-migrate: true
    enabled: true

server:
  port: ${SERVER_PORT:8080}

# Clave JWT (base64, ≥256 bits). Cambiar en producción vía variable de entorno.
jwt:
  secret: ${JWT_SECRET:cmVzdGF1cmFudFNlY3JldEtleUZvckpXVC1NYW5hZ2VtZW50U3lzdGVtLTIwMjQ=}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.restaurant: DEBUG
    org.springframework.r2dbc: INFO
    org.flywaydb: INFO
